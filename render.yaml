services:
  - type: web
    name: fuel-pilot-ai
    runtime: docker
    plan: standard
    region: singapore
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OLLAMA_HOST
        value: 0.0.0.0:10000
      - key: PORT
        value: "10000"
    disk:
      name: ollama-models
      mountPath: /root/.ollama
      sizeGB: 10
